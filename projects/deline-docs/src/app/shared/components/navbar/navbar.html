<nav class="navbar">
  <div class="navbar-start">
    <button (click)="menuToggle.emit()" type="button" class="navbar-hamburger" aria-label="Abrir menú">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <a routerLink="/" class="navbar-brand">
      <div class="navbar-logo">
        <span>D</span>
      </div>
      <span class="navbar-title">Deline <span class="navbar-title-muted">UI</span></span>
    </a>
    <span class="navbar-version">v1.0.0</span>
  </div>

  <div class="navbar-center">
    <div class="search-wrapper">
      <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        class="search-input"
        placeholder="Buscar componentes..."
        [value]="query()"
        (input)="onSearch($event)"
        (focus)="onSearchFocus()"
        (blur)="closeResults()"
      />
      @if (showResults()) {
        <div class="search-dropdown">
          @for (r of filtered(); track r.route) {
            <button class="search-result" (mousedown)="selectResult(r.route)">
              <span class="search-result-label">{{ r.label }}</span>
              <span class="search-result-category">{{ r.category }}</span>
            </button>
          }
        </div>
      }
    </div>
  </div>

  <div class="navbar-end">
    <button (click)="theme.toggle()" type="button" class="navbar-toggle" aria-label="Toggle theme">
      @if (theme.mode() === 'dark') {
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 11H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 4.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      } @else {
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      }
    </button>
  </div>
</nav>
