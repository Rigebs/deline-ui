<div class="textarea-wrapper">
    @if (label() && !hasParentFormField()) {
    <label class="field-label" [for]="id">{{ label() }}</label>
    }
    <div class="input-container">
        <textarea
            [id]="id"
            [formControl]="control()"
            [placeholder]="placeholder()"
            [rows]="rows()"
            [maxLength]="maxLength() || undefined"
            [attr.disabled]="disabled() ? '' : null"
            [readOnly]="readonly()"
            [attr.aria-describedby]="!hasParentFormField() ? describedByIds() : undefined"
            [attr.aria-invalid]="hasError || null"
            (focus)="onFocus()"
            (blur)="onBlur()"
            (beforeinput)="readonly() ? $event.preventDefault() : null"
            class="textarea-element"
        ></textarea>
    </div>
    <div class="field-footer">
        @if (!hasParentFormField()) {
          @if (showHelperOrError(); as text) {
          <span
              class="helper-text"
              [class.error-text]="hasError"
              [id]="hasError ? errorId() : helperId()">
              {{ text }}
          </span>
          }
        }
        @if (showCharCount() && maxLength()) {
        <span class="char-count">{{ charCount() }} / {{ maxLength() }}</span>
        }
    </div>
</div>
