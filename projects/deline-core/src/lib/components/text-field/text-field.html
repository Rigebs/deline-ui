<div class="field-wrapper">
    <label class="field-label">{{ label() }}</label>

    <div class="input-container" [attr.aria-describedby]="describedByIds()">
        @if (hasPrefix()) {
        <span class="input-prefix">
            <ng-container [ngTemplateOutlet]="prefixTemplate()!" />
        </span>
        }

        @if (multiline()) {
        <textarea 
          [formControl]="control()" 
          [placeholder]="placeholder()" 
          [disabled]="disabled()"
          [readonly]="readonly()"
          [attr.aria-invalid]="hasError"
          [attr.aria-readonly]="readonly()"
          (focus)="onFocus()" 
          (blur)="onBlur()" 
          class="native-input textarea"></textarea>
        } @else {
        <input 
          [type]="type()" 
          [formControl]="control()" 
          [placeholder]="placeholder()"
          [disabled]="disabled()"
          [readonly]="readonly()"
          [attr.aria-invalid]="hasError"
          [attr.aria-readonly]="readonly()"
          (focus)="onFocus()" 
          (blur)="onBlur()" 
          class="native-input" />
        }

        @if (hasSuffix()) {
        <span class="input-suffix">
            <ng-container [ngTemplateOutlet]="suffixTemplate()!" />
        </span>
        }
    </div>

    @if (hasError) {
    <span class="error-text" [id]="errorId()">{{ errorComputed }}</span>
    } @else if (helperText()) {
    <span class="helper-text" [id]="helperId()">{{ helperText() }}</span>
    }
</div>
