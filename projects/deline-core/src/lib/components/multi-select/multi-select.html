<div class="multi-select-wrapper">
    <label class="field-label" [attr.for]="selectId()">{{ label() }}</label>

    <div 
      class="input-container" 
      [class.is-open]="isOpen()"
      [id]="selectId()"
      role="combobox"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-haspopup]="'listbox'"
      [attr.aria-disabled]="disabled()"
      [attr.aria-required]="required()"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-describedby]="ariaDescribedBy()"
      tabindex="0"
      (click)="toggle()"
      (keydown)="onKeyDown($event)">
      <div class="chips-area">
          @for (item of selectedItems(); track item.value) {
          <span class="chip">
              {{ item.label }}
              <button 
                type="button"
                class="remove-chip" 
                (click)="remove(item.value, $event)" 
                [attr.aria-label]="'Quitar ' + item.label">
                  <dln-icon name="close" size="small" />
              </button>
          </span>
          }

          @if (selectedItems().length === 0) {
          <span class="placeholder">{{ placeholder() }}</span>
          }
      </div>

      <dln-icon [name]="isOpen() ? 'arrow-up' : 'arrow-down'" size="small" />
    </div>

    @if (isOpen()) {
    <div class="dropdown-list" role="listbox">
      @for (item of renderedItems(); track $index) {
        @if (item.kind === 'header') {
          <div class="dropdown-header" role="presentation">
            <span class="dropdown-header-label">{{ item.label }}</span>
          </div>
        } @else {
          <button
            type="button"
            class="option-item"
            role="option"
            [class.focused]="focusedIndex() === item.flatIndex"
            [class.disabled]="item.option.disabled"
            [attr.aria-selected]="false"
            [attr.aria-disabled]="item.option.disabled"
            (click)="select(item.option)"
            (mousedown)="$event.preventDefault()">
            {{ item.option.label }}
          </button>
        }
      } @empty {
        <div class="option-empty" role="option" aria-disabled="true">No hay más opciones</div>
      }
    </div>
    }
</div>
